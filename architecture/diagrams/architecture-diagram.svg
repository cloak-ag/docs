<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 700">
  <!-- Background -->
  <rect width="900" height="700" fill="#ffffff"/>
  
  <!-- Title -->
  <text x="450" y="40" font-family="Arial" font-size="24" font-weight="bold" text-anchor="middle">Cloak Architecture - User Flow</text>
  
  <!-- User Connects Wallet -->
  <rect x="250" y="60" width="400" height="50" rx="5" fill="#f0f0f0" stroke="#000" stroke-width="2"/>
  <text x="450" y="90" font-family="Arial" font-size="16" text-anchor="middle">User Connects Wallet</text>
  
  <!-- Arrow -->
  <line x1="450" y1="110" x2="450" y2="150" stroke="#000" stroke-width="2" marker-end="url(#arrowhead)"/>
  
  <!-- Encryption Provider -->
  <rect x="150" y="150" width="600" height="120" rx="5" fill="#e0e0ff" stroke="#000" stroke-width="2"/>
  <text x="460" y="175" font-family="Arial" font-size="16" font-weight="bold" text-anchor="middle">Encryption Provider</text>
  <text x="170" y="205" font-family="Arial" font-size="12">1. Wallet signs "Cloak: Sign in"</text>
  <text x="170" y="225" font-family="Arial" font-size="12">2. Signature → PBKDF2 → encryption key</text>
  <text x="170" y="245" font-family="Arial" font-size="12">3. Encryption key stored in memory (not wallet)</text>
  <text x="170" y="265" font-family="Arial" font-size="12">4. Used to decrypt UTXO view keys locally</text>
  
  <!-- Arrow -->
  <line x1="450" y1="270" x2="450" y2="320" stroke="#000" stroke-width="2" marker-end="url(#arrowhead)"/>
  
  <!-- User Action -->
  <text x="460" y="310" font-family="Arial" font-size="12" text-anchor="middle">User Action: Export Compliance</text>
  
  <!-- Browser -->
  <rect x="50" y="330" width="180" height="100" rx="5" fill="#fff8e0" stroke="#000" stroke-width="2"/>
  <text x="140" y="355" font-family="Arial" font-size="14" font-weight="bold" text-anchor="middle">Browser</text>
  <text x="70" y="385" font-family="Arial" font-size="11">1. Get nonce</text>
  <text x="70" y="405" font-family="Arial" font-size="11">2. Sign nonce</text>
  <text x="70" y="425" font-family="Arial" font-size="11">3. POST /export</text>
  
  <!-- Arrow to Relay -->
  <line x1="230" y1="380" x2="320" y2="380" stroke="#000" stroke-width="2" marker-end="url(#arrowhead)"/>
  
  <!-- Relay Server -->
  <rect x="320" y="330" width="200" height="100" rx="5" fill="#e0ffe0" stroke="#000" stroke-width="2"/>
  <text x="420" y="355" font-family="Arial" font-size="14" font-weight="bold" text-anchor="middle">Relay Server</text>
  <text x="340" y="385" font-family="Arial" font-size="11">/compliance/nonce</text>
  <text x="340" y="405" font-family="Arial" font-size="11">/compliance/export</text>
  <text x="340" y="425" font-family="Arial" font-size="10">Returns: transactions + summary</text>
  
  <!-- Arrow to Indexer -->
  <line x1="520" y1="380" x2="610" y2="380" stroke="#000" stroke-width="2" marker-end="url(#arrowhead)"/>
  
  <!-- Blockchain Indexer -->
  <rect x="610" y="330" width="250" height="130" rx="5" fill="#ffe0e0" stroke="#000" stroke-width="2"/>
  <text x="735" y="355" font-family="Arial" font-size="14" font-weight="bold" text-anchor="middle">Blockchain Indexer</text>
  <text x="630" y="385" font-family="Arial" font-size="11">Scans for Cloak protocol txs</text>
  <text x="630" y="405" font-family="Arial" font-size="11">For each transaction:</text>
  <text x="640" y="425" font-family="Arial" font-size="10">• amount</text>
  <text x="640" y="440" font-family="Arial" font-size="10">• recipient</text>
  <text x="640" y="455" font-family="Arial" font-size="10">• timestamp, signature, running_balance</text>
  
  <!-- Arrow back from Indexer to Relay -->
  <line x1="735" y1="460" x2="735" y2="500" stroke="#000" stroke-width="2" marker-end="url(#arrowhead)"/>
  
  <!-- No Database -->
  <rect x="620" y="500" width="230" height="50" rx="5" fill="#cccccc" stroke="#000" stroke-width="2"/>
  <text x="735" y="530" font-family="Arial" font-size="14" text-anchor="middle">NO DATABASE STORAGE</text>
  
  <!-- Arrow from Indexer to No DB -->
  <line x1="660" y1="460" x2="660" y2="500" stroke="#000" stroke-width="1" stroke-dasharray="5,5"/>
  
  <!-- Arrow back from Relay to Browser -->
  <line x1="420" y1="430" x2="420" y2="470" stroke="#000" stroke-width="2" marker-end="url(#arrowhead)"/>
  
  <!-- Result to Browser -->
  <rect x="300" y="470" width="240" height="40" rx="5" fill="#f0f0f0" stroke="#000" stroke-width="2"/>
  <text x="420" y="495" font-family="Arial" font-size="12" text-anchor="middle">User downloads PDF/CSV</text>
  
  <!-- Arrow definitions -->
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#000"/>
    </marker>
  </defs>
</svg>