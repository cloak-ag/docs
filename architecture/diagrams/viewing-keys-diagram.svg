<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 700" role="img" aria-label="Cloak viewing key lifecycle">
  <defs>
    <style>
      .title { font: 700 34px 'Inter', 'Segoe UI', Arial, sans-serif; fill: #0f172a; }
      .subtitle { font: 500 15px 'Inter', 'Segoe UI', Arial, sans-serif; fill: #475569; }
      .h { font: 700 21px 'Inter', 'Segoe UI', Arial, sans-serif; fill: #0f172a; }
      .b { font: 500 14px 'Inter', 'Segoe UI', Arial, sans-serif; fill: #334155; }
      .k { font: 600 13px 'Inter', 'Segoe UI', Arial, sans-serif; fill: #0f172a; }
      .line { stroke: #334155; stroke-width: 2.2; fill: none; }
      .dash { stroke: #94a3b8; stroke-width: 1.6; fill: none; stroke-dasharray: 6 5; }
    </style>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f8fafc"/>
      <stop offset="100%" stop-color="#f1f5f9"/>
    </linearGradient>
    <marker id="arrow" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <path d="M0,0 L10,4 L0,8 Z" fill="#334155"/>
    </marker>
  </defs>

  <rect width="1100" height="700" fill="url(#bg)"/>

  <text x="550" y="58" class="title" text-anchor="middle">Viewing Keys + Compliance Flow (Current)</text>
  <text x="550" y="84" class="subtitle" text-anchor="middle">nk-derived chain-note decryption, identifier-based registration, scanner-first user history</text>

  <rect x="70" y="130" width="460" height="292" rx="18" fill="#eef2ff" stroke="#6366f1" stroke-width="2"/>
  <text x="300" y="169" class="h" text-anchor="middle">Client (Web / SDK)</text>

  <rect x="98" y="190" width="404" height="62" rx="12" fill="#ffffff" stroke="#cbd5e1"/>
  <text x="300" y="216" class="k" text-anchor="middle">1) Derive wallet keys from sign-in signature</text>
  <text x="300" y="238" class="b" text-anchor="middle">Use sk_spend -> derive nk for chain-note viewing</text>

  <rect x="98" y="266" width="404" height="64" rx="12" fill="#ffffff" stroke="#cbd5e1"/>
  <text x="300" y="292" class="k" text-anchor="middle">2) Register viewing key with relay</text>
  <text x="300" y="314" class="b" text-anchor="middle">Send user_pubkey + viewing_key(nk hex) + signature + identifier</text>

  <rect x="98" y="344" width="404" height="62" rx="12" fill="#ffffff" stroke="#cbd5e1"/>
  <text x="300" y="370" class="k" text-anchor="middle">3) Submit protocol txs (deposit/send/withdraw/swap)</text>
  <text x="300" y="392" class="b" text-anchor="middle">Each tx carries CLVK compact chain-note envelope on-chain</text>

  <rect x="570" y="130" width="460" height="292" rx="18" fill="#ecfdf5" stroke="#16a34a" stroke-width="2"/>
  <text x="800" y="169" class="h" text-anchor="middle">Relay + Admin Compliance</text>

  <rect x="598" y="190" width="404" height="62" rx="12" fill="#ffffff" stroke="#cbd5e1"/>
  <text x="800" y="216" class="k" text-anchor="middle">A) Verify signature and compute identifier</text>
  <text x="800" y="238" class="b" text-anchor="middle">identifier = sha256(user_pubkey || viewing_key_hex)</text>

  <rect x="598" y="266" width="404" height="64" rx="12" fill="#ffffff" stroke="#cbd5e1"/>
  <text x="800" y="292" class="k" text-anchor="middle">B) Store (identifier, viewing_key) in DB</text>
  <text x="800" y="314" class="b" text-anchor="middle">Supports multiple keys per user_pubkey across resets</text>

  <rect x="598" y="344" width="404" height="62" rx="12" fill="#ffffff" stroke="#cbd5e1"/>
  <text x="800" y="370" class="k" text-anchor="middle">C) Admin endpoints decrypt from chain notes</text>
  <text x="800" y="392" class="b" text-anchor="middle">Try matching keys, verify chain_note_hash integrity</text>

  <line x1="502" y1="298" x2="598" y2="298" class="line" marker-end="url(#arrow)"/>
  <line x1="502" y1="375" x2="598" y2="375" class="line" marker-end="url(#arrow)"/>

  <rect x="70" y="462" width="960" height="176" rx="18" fill="#ffffff" stroke="#cbd5e1"/>
  <text x="550" y="499" class="h" text-anchor="middle">User-Facing History Path</text>

  <text x="110" y="531" class="k">- Primary path: SDK scanner reads chain transactions directly (no relay dependency for user history)</text>
  <text x="110" y="555" class="b">Decrypt with nk, compute gross/fee/net, return compliance report + lastSignature cursor</text>
  <text x="110" y="579" class="k">- Web cache: encrypted localStorage key `cloak_compliance_{wallet}`</text>
  <text x="110" y="603" class="b">History page loads cache first, supports clear-cache + rescan for freshness</text>

  <line x1="300" y1="422" x2="300" y2="462" class="dash"/>
  <line x1="800" y1="422" x2="800" y2="462" class="dash"/>
</svg>
