<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500">
  <!-- Background -->
  <rect width="900" height="500" fill="#ffffff"/>
  
  <!-- Title -->
  <text x="450" y="30" font-family="Arial" font-size="24" font-weight="bold" text-anchor="middle">Viewing Key Chains</text>
  
  <!-- User's View Key Box -->
  <rect x="50" y="60" width="380" height="180" rx="5" fill="#e0e0ff" stroke="#000" stroke-width="2"/>
  <text x="240" y="85" font-family="Arial" font-size="16" font-weight="bold" text-anchor="middle">USER'S VIEW KEY</text>
  <text x="70" y="115" font-family="Arial" font-size="12">(derived from encryption key)</text>
  
  <!-- Encryption Key -->
  <rect x="80" y="130" width="120" height="40" rx="3" fill="#fff8e0" stroke="#000" stroke-width="1"/>
  <text x="140" y="155" font-family="Arial" font-size="12" text-anchor="middle">Encryption Key</text>
  <text x="140" y="170" font-family="Arial" font-size="9" text-anchor="middle">(from wallet sig)</text>
  
  <!-- Arrow -->
  <line x1="200" y1="150" x2="260" y2="150" stroke="#000" stroke-width="2" marker-end="url(#arrowhead)"/>
  
  <!-- PBKDF2 -->
  <rect x="260" y="130" width="100" height="40" rx="3" fill="#e0ffe0" stroke="#000" stroke-width="1"/>
  <text x="310" y="155" font-family="Arial" font-size="12" text-anchor="middle">PBKDF2</text>
  
  <!-- Arrow -->
  <line x1="360" y1="150" x2="400" y2="150" stroke="#000" stroke-width="2" marker-end="url(#arrowhead)"/>
  
  <!-- User's View Key -->
  <rect x="400" y="130" width="120" height="40" rx="3" fill="#ffe0e0" stroke="#000" stroke-width="1"/>
  <text x="460" y="150" font-family="Arial" font-size="11" text-anchor="middle">User's View Key</text>
  <text x="460" y="165" font-family="Arial" font-size="9" text-anchor="middle">(private)</text>
  
  <!-- Arrow down -->
  <line x1="460" y1="170" x2="460" y2="200" stroke="#000" stroke-width="2" marker-end="url(#arrowhead)"/>
  
  <!-- Decrypt Own UTXOs -->
  <rect x="350" y="200" width="220" height="35" rx="3" fill="#f0f0f0" stroke="#000" stroke-width="1"/>
  <text x="460" y="223" font-family="Arial" font-size="12" text-anchor="middle">Decrypt own UTXOs</text>
  
  <!-- Compliance View Key Box -->
  <rect x="470" y="60" width="380" height="180" rx="5" fill="#ffe0e0" stroke="#000" stroke-width="2"/>
  <text x="660" y="85" font-family="Arial" font-size="16" font-weight="bold" text-anchor="middle">COMPLIANCE VIEW KEY</text>
  <text x="490" y="115" font-family="Arial" font-size="12">(shared with Cloak for compliance)</text>
  
  <!-- Master Compliance Key -->
  <rect x="500" y="130" width="150" height="40" rx="3" fill="#fff8e0" stroke="#000" stroke-width="1"/>
  <text x="575" y="155" font-family="Arial" font-size="11" text-anchor="middle">Master Compliance Key</text>
  <text x="575" y="170" font-family="Arial" font-size="9" text-anchor="middle">(relay's public key)</text>
  
  <!-- Arrow -->
  <line x1="650" y1="150" x2="700" y2="150" stroke="#000" stroke-width="2" marker-end="url(#arrowhead)"/>
  
  <!-- Derive -->
  <rect x="700" y="130" width="130" height="40" rx="3" fill="#e0ffe0" stroke="#000" stroke-width="1"/>
  <text x="765" y="155" font-family="Arial" font-size="11" text-anchor="middle">Derive user-</text>
  <text x="765" y="170" font-family="Arial" font-size="9" text-anchor="middle">specific key</text>
  
  <!-- Arrow -->
  <line x1="765" y1="170" x2="765" y2="200" stroke="#000" stroke-width="2" marker-end="url(#arrowhead)"/>
  
  <!-- Compliance Encrypted Blob -->
  <rect x="685" y="200" width="160" height="35" rx="3" fill="#ffe0e0" stroke="#000" stroke-width="1"/>
  <text x="765" y="223" font-family="Arial" font-size="11" text-anchor="middle">Compliance-encrypted blob</text>
  
  <!-- Arrow down -->
  <line x1="765" y1="235" x2="765" y2="260" stroke="#000" stroke-width="2" marker-end="url(#arrowhead)"/>
  
  <!-- Admin View -->
  <rect x="655" y="260" width="220" height="35" rx="3" fill="#f0f0f0" stroke="#000" stroke-width="1"/>
  <text x="765" y="283" font-family="Arial" font-size="12" text-anchor="middle">Admin compliance view (via relay)</text>
  
  <!-- Key Points -->
  <rect x="50" y="280" width="800" height="100" rx="5" fill="#fff8e0" stroke="#000" stroke-width="2"/>
  <text x="450" y="305" font-family="Arial" font-size="16" font-weight="bold" text-anchor="middle">KEY POINTS</text>
  <text x="70" y="335" font-family="Arial" font-size="12">• User's View Key: Private, stays on device, allows viewing own UTXOs</text>
  <text x="70" y="360" font-family="Arial" font-size="12">• Compliance View Key: Shared with Cloak relay, enables regulatory compliance</text>
  <text x="70" y="385" font-family="Arial" font-size="12">• Both derived from user's encryption key (which comes from wallet signature)</text>
  
  <!-- Arrow definitions -->
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#000"/>
    </marker>
  </defs>
</svg>